border-radius:10px;

color:#38bdf8;
margin-bottom:10px;

margin:8px 0;

function searchFish(){

const fishName = document.getElementById("fishInput").value.toLowerCase();

const fish = fishDatabase.find(
f => f.name.toLowerCase().includes(fishName)
);

const result = document.getElementById("result");

if(fish){

result.innerHTML = `
<div class="card">
<h2>${fish.name}</h2>
<div class="info"><b>Scientific Name:</b> ${fish.scientificName}</div>
<div class="info"><b>Tank Size:</b> ${fish.tankSize}</div>
<div class="info"><b>Temperature:</b> ${fish.temperature}</div>
<div class="info"><b>pH:</b> ${fish.ph}</div>
<div class="info"><b>Diet:</b> ${fish.diet}</div>
<div class="info"><b>Temperament:</b> ${fish.temperament}</div>
<div class="info"><b>Difficulty:</b> ${fish.difficulty}</div>
</div>
`;

}else{

result.innerHTML = `
<div class="card">
<h2>Fish Not Found</h2>
<p>This fish is not yet available in Aquadex.</p>
</div>
`;

}

}

document.getElementById("fishInput").addEventListener("keypress", function(event){
if(event.key==="Enter"){
searchFish();
}
