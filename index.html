<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquadex</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081224;
color:white;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#38bdf8;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#94a3b8;
margin-bottom:30px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
}

button{
padding:15px 25px;
font-size:18px;
background:#38bdf8;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-top:20px;
}

.card h2{
color:#38bdf8;
margin-bottom:10px;
}

.info{
margin:8px 0;
}
</style>

</head>
<body>

<div class="container">

<h1>🐠 Aquadex</h1>
<p class="subtitle">Aquarium Fish Requirement Checker</p>

<div class="search-box">
<input type="text" id="fishInput" placeholder="Enter fish name">
<button onclick="searchFish()">Search</button>
</div>

<div id="result"></div>

</div>

<script>

const fishDatabase = [

{
name:"Guppy",
scientificName:"Poecilia reticulata",
tankSize:"10 Gallons",
temperature:"22-28°C",
ph:"7.0-8.0",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"Molly",
scientificName:"Poecilia sphenops",
tankSize:"20 Gallons",
temperature:"24-28°C",
ph:"7.5-8.5",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"Platy",
scientificName:"Xiphophorus maculatus",
tankSize:"10 Gallons",
temperature:"20-26°C",
ph:"7.0-8.2",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"Zebra Danio",
scientificName:"Danio rerio",
tankSize:"15 Gallons",
temperature:"18-26°C",
ph:"6.5-7.5",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"Honey Gourami",
scientificName:"Trichogaster chuna",
tankSize:"15 Gallons",
temperature:"22-28°C",
ph:"6.0-7.5",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"German Blue Ram",
scientificName:"Mikrogeophagus ramirezi",
tankSize:"20 Gallons",
temperature:"26-30°C",
ph:"5.5-7.0",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Intermediate"
},

{
name:"Angelfish",
scientificName:"Pterophyllum scalare",
tankSize:"30 Gallons",
temperature:"24-30°C",
ph:"6.0-7.5",
diet:"Omnivore",
temperament:"Semi Aggressive",
difficulty:"Intermediate"
},

{
name:"Cardinal Tetra",
scientificName:"Paracheirodon axelrodi",
tankSize:"15 Gallons",
temperature:"24-29°C",
ph:"4.5-7.0",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
},

{
name:"Black Neon Tetra",
scientificName:"Hyphessobrycon herbertaxelrodi",
tankSize:"15 Gallons",
temperature:"22-28°C",
ph:"5.5-7.5",
diet:"Omnivore",
temperament:"Peaceful",
difficulty:"Beginner"
}

];

function searchFish(){

const fishName = document.getElementById("fishInput").value.toLowerCase();

const fish = fishDatabase.find(
f => f.name.toLowerCase().includes(fishName)
);

const result = document.getElementById("result");

if(fish){

result.innerHTML = `
<div class="card">
<h2>${fish.name}</h2>
<div class="info"><b>Scientific Name:</b> ${fish.scientificName}</div>
<div class="info"><b>Tank Size:</b> ${fish.tankSize}</div>
<div class="info"><b>Temperature:</b> ${fish.temperature}</div>
<div class="info"><b>pH:</b> ${fish.ph}</div>
<div class="info"><b>Diet:</b> ${fish.diet}</div>
<div class="info"><b>Temperament:</b> ${fish.temperament}</div>
<div class="info"><b>Difficulty:</b> ${fish.difficulty}</div>
</div>
`;

}else{

result.innerHTML = `
<div class="card">
<h2>Fish Not Found</h2>
<p>This fish is not yet available in Aquadex.</p>
</div>
`;

}

}

document.getElementById("fishInput").addEventListener("keypress", function(event){
if(event.key==="Enter"){
searchFish();
}
});

</script>

</body>
</html>
